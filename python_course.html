<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPEX - Python Course</title>
    <link rel="stylesheet" href="css/style.css?v=1.3">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        /* كود الخلفية لضمان إنها تملأ الشاشة وتظهر خلف كل حاجة */
        #particles-js {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 1 !important;
            pointer-events: none;
        }
        .course-page-container {
            position: relative;
            z-index: 2; /* عشان المحتوى يظهر فوق الشبكة وتعرف تضغط على الأزرار */
            max-width: 1200px;
            margin: 150px auto 60px auto;
            padding: 0 20px;
            text-align: center;
        }
        .course-title {
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        .course-title span {
            color: #dfcda4;
        }
        .content-box {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(223, 205, 164, 0.15);
            border-radius: 20px;
            padding: 50px 20px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="particles-js" style="position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; z-index: 1 !important; pointer-events: none;"></div>

    <header style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1200px; z-index: 1000;">
        <nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(223, 205, 164, 0.25); border-radius: 50px; box-shadow: 0 4px 30px rgba(0,0,0,0.5);">
            <a href="index.html" style="font-weight: 900; font-size: 24px; color: #dfcda4; text-decoration: none; letter-spacing: 1px;">AIPEX</a>
            <div style="display: flex; gap: 30px;">
                <a href="index.html" style="color: #ffffff; text-decoration: none; font-weight: 600; font-size: 14px; transition: color 0.3s;">Home</a>
                <a href="index.html#about" style="color: #ffffff; text-decoration: none; font-weight: 600; font-size: 14px; transition: color 0.3s;">About</a>
                <a href="index.html#contact" style="color: #ffffff; text-decoration: none; font-weight: 600; font-size: 14px; transition: color 0.3s;">Contact</a>
            </div>
        </nav>
    </header>

    <main class="course-page-container">
        <h1 class="course-title">&lt;Python 3 for <span>Web & Automation</span>/&gt;</h1>
        <p style="color: rgba(225,225,225,0.7); font-size: 18px; font-family: 'Cairo', sans-serif;">
            مرحباً بك في كورس البايثون الشامل. هنا هتلاقي كل المحاضرات والتطبيقات العملي.
        </p>
        
        <div class="content-box">
            <p style="color: #dfcda4; font-size: 20px; font-weight: 800; letter-spacing: 2px; font-family: 'Montserrat', sans-serif; text-shadow: 0 0 10px rgba(223, 205, 164, 0.3);">
                COURSES CONTENT COMING SOON...
            </p>
        </div>
    </main>

    <footer style="position: relative; z-index: 2; text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.3); font-size: 13px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 120px;">
        © 2026 AIPEX. All Rights Reserved. Designed by <span style="color: #dfcda4;">Ayman Elshahat</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" onload="initParticles()"></script>
    <script>
        // دالة تضمن إن السكريبت مش هيشتغل غير بعد ما المكتبة تحمل تماماً عشان نمنع أي خطأ
        function initParticles() {
            particlesJS('particles-js', {
                "particles": {
                    "number": {
                        "value": 100, /* زودنا العدد شوية عشان تبان واضحة جداً */
                        "density": {
                            "enable": true,
                            "value_area": 800
                        }
                    },
                    "color": {
                        "value": "#ffffff"
                    },
                    "shape": {
                        "type": "circle"
                    },
                    "opacity": {
                        "value": 0.4, /* رفعنا الشفافية عشان تظهر بوضوح فوق الخلفية السوداء */
                        "random": false
                    },
                    "size": {
                        "value": 3,
                        "random": true
                    },
                    "line_linked": {
                        "enable": true,
                        "distance": 150,
                        "color": "#ffffff",
                        "opacity": 0.25, /* توضيح الخطوط المتشابكة */
                        "width": 1
                    },
                    "move": {
                        "enable": true,
                        "speed": 2,
                        "direction": "none",
                        "random": false,
                        "straight": false,
                        "out_mode": "out",
                        "bounce": false
                    }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": {
                        "onhover": {
                            "enable": true,
                            "mode": "grab"
                        },
                        "onclick": {
                            "enable": true,
                            "mode": "push"
                        },
                        "resize": true
                    },
                    "modes": {
                        "grab": {
                            "distance": 140,
                            "line_linked": {
                                "opacity": 0.6
                            }
                        }
                    }
                },
                "retina_detect": true
            });
        }
    </script>

</body>
</html>
