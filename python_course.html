<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPEX - Python Course</title>
    <link rel="stylesheet" href="css/style.css?v=1.3">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Montserrat:wght@400;600;800;900&family=Orbitron:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* خلفية الشبكة المتحركة */
        #particles-js {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 1 !important;
            pointer-events: none;
        }

        /* الـ Navbar الأصلي للكمبيوتر */
        .aipex-nav {
            position: fixed !important;
            top: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 90% !important;
            max-width: 1200px !important;
            z-index: 1000 !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 15px 40px !important;
            background: rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(223, 205, 164, 0.25) !important;
            border-radius: 50px !important;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5) !important;
        }

        .brand-logo {
            font-weight: 900 !important;
            font-size: 24px !important;
            color: #dfcda4 !important;
            text-decoration: none !important;
            letter-spacing: 1px !important;
        }

        .nav-menu {
            display: flex !important;
            gap: 30px !important;
            list-style: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .nav-menu li a {
            color: #ffffff !important;
            text-decoration: none !important;
            font-weight: 600 !important;
            font-size: 14px !important;
            transition: color 0.3s !important;
        }

        .nav-menu li a:hover {
            color: #dfcda4 !important;
        }

        /* الفوتر الافتراضي للشاشات الكبيرة */
        .site-footer {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 120px;
            white-space: nowrap; /* يمنع نزول النص لسطر جديد تلقائياً */
        }

        .designer-name {
            color: #ffffff !important; /* خليناه بلون أبيض عادي */
        }

        /* تعديلات الموبايل فقط (أقل من 600px) */
        @media (max-width: 600px) {
            .aipex-nav {
                width: 95% !important;
                padding: 10px 20px !important;
                top: 15px !important;
            }
            .brand-logo {
                font-size: 18px !important;
            }
            .nav-menu {
                gap: 15px !important;
            }
            .nav-menu li a {
                font-size: 11px !important;
            }
            /* تصغير خط الفوتر لضمان ظهوره كاملاً في سطر واحد على الموبايل */
            .site-footer {
                font-size: 10px !important; 
                padding: 30px 10px !important;
                margin-top: 80px !important;
            }
        }

        /* محتوى الكورس */
        .course-page-container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 150px auto 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .course-title {
            font-size: clamp(24px, 5vw, 42px);
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .course-title span {
            color: #dfcda4;
        }

        /* المربع بخلفية سوداء كاملة وتأثير حواف ذهبية عند الاقتراب */
        .content-box {
            background: #000000 !important;
            border: 1px solid rgba(223, 205, 164, 0.15);
            border-radius: 20px;
            padding: 60px 20px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .content-box:hover {
            border-color: rgba(223, 205, 164, 0.4);
            box-shadow: 0 10px 40px rgba(223, 205, 164, 0.08);
        }

        /* النص المائل بنفس ستايل صورتك مع توهج ذهبي خفيف */
        .coming-soon-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: clamp(18px, 3.5vw, 28px);
            color: #ffffff !important;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            cursor: default;
            user-select: none;
        }

        /* التوهج الذهبي الخفيف عند الاقتراب */
        .content-box:hover .coming-soon-text {
            color: #ffffff !important;
            text-shadow: 0 0 10px rgba(223, 205, 164, 0.6), 0 0 20px rgba(223, 205, 164, 0.3);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="aipex-nav">
        <a href="index.html" class="brand-logo">AIPEX</a>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <main class="course-page-container">
        <h1 class="course-title">&lt;Python 3 for <span>Web & Automation</span>/&gt;</h1>
        <p style="color: rgba(225,225,225,0.7); font-size: clamp(14px, 1.8vw, 18px); font-family: 'Cairo', sans-serif; padding: 0 10px;">
            مرحباً بك في كورس البايثون الشامل. هنا هتلاقي كل المحاضرات والتطبيقات العملي.
        </p>
        
        <div class="content-box">
            <span class="coming-soon-text">COURSES CONTENT COMING SOON</span>
        </div>
    </main>

    <footer class="site-footer">
        © 2026 AIPEX. All Rights Reserved. Designed by <span class="designer-name">Ayman Elshahat</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        function loadParticles() {
            if (typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                    "particles": {
                        "number": { "value": 70, "density": { "enable": true, "value_area": 800 } },
                        "color": { "value": "#ffffff" },
                        "shape": { "type": "circle" },
                        "opacity": { "value": 0.3, "random": false },
                        "size": { "value": 3, "random": true },
                        "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2, "width": 1 },
                        "move": { "enable": true, "speed": 1.5, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
                    },
                    "interactivity": {
                        "detect_on": "canvas",
                        "events": {
                            "onhover": { "enable": true, "mode": "grab" },
                            "onclick": { "enable": true, "mode": "push" },
                            "resize": true
                        },
                        "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } } }
                    },
                    "retina_detect": true
                });
            }
        }
        
        window.addEventListener('load', loadParticles);
        setTimeout(loadParticles, 500);
    </script>

</body>
</html>
